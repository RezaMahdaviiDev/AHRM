{{define "content"}}
<h1>فرصت‌های آربیتراژ</h1>
<div class="card">
<table>
  <thead><tr><th>سررسید</th><th>اعمال</th><th>R %</th><th>Call</th><th>Put</th><th>سرمایه</th></tr></thead>
  <tbody>
  {{range .Snapshot.Opportunities}}
    <tr>
      <td>{{.Expiry}}</td>
      <td>{{printf "%.0f" .Strike}}</td>
      <td>{{printf "%.2f" .ReturnPct}}</td>
      <td>{{printf "%.0f" .CallPrice}}</td>
      <td>{{printf "%.0f" .PutPrice}}</td>
      <td>{{printf "%.0f" .Capital}}</td>
    </tr>
  {{else}}
    <tr><td colspan="6">داده‌ای یافت نشد</td></tr>
  {{end}}
  </tbody>
</table>
</div>
{{end}}
