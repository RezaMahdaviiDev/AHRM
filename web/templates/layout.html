{{define "layout"}}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} | AHRM Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Tahoma, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 1rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    header a { color: #93c5fd; text-decoration: none; }
    main { padding: 1.5rem 2rem; }
    .card { background: #1e293b; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { border: 1px solid #334155; padding: 0.4rem; text-align: center; }
    .alert-high { color: #f87171; }
    .alert-low { color: #fbbf24; }
    .errors { color: #fca5a5; }
  </style>
</head>
<body>
  <header>
    <strong>AHRM Scanner</strong>
    <a href="/dashboard">داشبورد</a>
    <a href="/arbitrage">آربیتراژ</a>
    <a href="/hv">HV</a>
    <a href="/market">بازار</a>
    <a href="/matrix">ماتریس</a>
    <a href="/queue">صف سرخطی</a>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
