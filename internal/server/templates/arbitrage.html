<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head><meta charset="UTF-8"><title>Arbitrage | AHRM</title>
<style>body{font-family:Tahoma;background:#0f172a;color:#e2e8f0}table{width:100%;border-collapse:collapse}td,th{border:1px solid #334155;padding:.4rem}</style></head>
<body>
<nav><a href="/dashboard">داشبورد</a></nav>
<h1>آربیتراژ</h1>
<table>
<tr><th>سررسید</th><th>اعمال</th><th>R%</th><th>Call</th><th>Put</th></tr>
{{range .Snapshot.Opportunities}}<tr><td>{{.Expiry}}</td><td>{{printf "%.0f" .Strike}}</td><td>{{printf "%.2f" .ReturnPct}}</td><td>{{printf "%.0f" .CallPrice}}</td><td>{{printf "%.0f" .PutPrice}}</td></tr>{{else}}<tr><td colspan="5">بدون داده</td></tr>{{end}}
</table>
</body></html>
