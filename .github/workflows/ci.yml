name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: vet / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Use the version declared in go.mod so CI and the codebase never drift.
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Integration tests self-skip unless a database is configured, so the full
      # suite is safe (and fast) to run here without external services.
      - name: Test
        run: go test ./... -count=1
